<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #4ec0ca 0%, #87ceeb 100%);
            font-family: 'Arial', sans-serif;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #4ec0ca 0%, #87ceeb 60%, #e8f4d4 100%);
            overflow: hidden;
            border: 3px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.9;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }

        .cloud1 {
            width: 100px;
            height: 40px;
            top: 80px;
            left: 50px;
        }

        .cloud1::before {
            width: 50px;
            height: 40px;
            top: -20px;
            left: 10px;
        }

        .cloud1::after {
            width: 60px;
            height: 35px;
            top: -15px;
            right: 10px;
        }

        .cloud2 {
            width: 120px;
            height: 45px;
            top: 120px;
            right: 80px;
        }

        .cloud2::before {
            width: 55px;
            height: 45px;
            top: -22px;
            left: 15px;
        }

        .cloud2::after {
            width: 65px;
            height: 40px;
            top: -18px;
            right: 15px;
        }

        .cloud3 {
            width: 90px;
            height: 35px;
            top: 50px;
            right: 20px;
        }

        .cloud3::before {
            width: 45px;
            height: 35px;
            top: -18px;
            left: 10px;
        }

        /* City buildings */
        .buildings {
            position: absolute;
            bottom: 150px;
            left: 0;
            width: 100%;
            height: 150px;
            display: flex;
            gap: 20px;
            padding: 0 20px;
        }

        .building {
            flex: 1;
            background: rgba(200, 220, 240, 0.8);
            border: 2px solid rgba(100, 150, 180, 0.5);
            position: relative;
        }

        .building::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 20%;
            background: rgba(100, 150, 200, 0.3);
            border: 1px solid rgba(100, 150, 180, 0.5);
        }

        /* Ground */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, #7cb342 0%, #558b2f 100%);
            border-top: 3px solid #33691e;
        }

        #bird {
            position: absolute;
            width: 45px;
            height: 45px;
            background: #4a90e2;
            border-radius: 50%;
            border: 3px solid #2c5aa0;
            z-index: 10;
            transition: transform 0.1s;
        }

        #bird::before {
            content: '';
            position: absolute;
            top: 8px;
            right: -8px;
            width: 15px;
            height: 15px;
            background: #ff6b35;
            border-radius: 50% 0 50% 50%;
            transform: rotate(-45deg);
            border: 2px solid #d94a1a;
        }

        #bird::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 8px;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            border: 2px solid #333;
        }

        .pipe {
            position: absolute;
            width: 60px;
            background: linear-gradient(to right, #2d5016 0%, #4a7c29 50%, #2d5016 100%);
            border: 3px solid #1a3d0a;
            border-radius: 5px;
            z-index: 5;
        }

        .pipe-top {
            border-bottom: 10px solid #4a7c29;
        }

        .pipe-bottom {
            border-top: 10px solid #4a7c29;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #333, -1px -1px 0 #333, 1px -1px 0 #333, -1px 1px 0 #333;
            z-index: 100;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #gameOver h2 {
            color: white;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #gameOver p {
            color: #ddd;
            font-size: 20px;
            margin-bottom: 25px;
        }

        #retryBtn {
            background: linear-gradient(to bottom, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c44540;
            transition: all 0.1s;
        }

        #retryBtn:hover {
            background: linear-gradient(to bottom, #ff7b7b 0%, #ff6a62 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #c44540;
        }

        #retryBtn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c44540;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Clouds -->
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>

        <!-- Buildings -->
        <div class="buildings">
            <div class="building" style="height: 80px;"></div>
            <div class="building" style="height: 110px;"></div>
            <div class="building" style="height: 70px;"></div>
            <div class="building" style="height: 95px;"></div>
            <div class="building" style="height: 85px;"></div>
        </div>

        <!-- Ground -->
        <div class="ground"></div>

        <!-- Bird -->
        <div id="bird"></div>

        <!-- Score -->
        <div id="score">0</div>

        <!-- Game Over Modal -->
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button id="retryBtn">Retry</button>
        </div>

        <!-- Instructions -->
        <div id="instructions">
            <p>Press SPACE or Click to Jump!</p>
        </div>
    </div>

    <script>
        const bird = document.getElementById('bird');
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        const gameOverModal = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const retryBtn = document.getElementById('retryBtn');

        let birdTop = 250;
        let birdVelocity = 0;
        let gravity = 0.5;
        let isGameOver = false;
        let score = 0;
        let pipes = [];
        let gameLoop;
        let pipeInterval;

        function initializeGame() {
            birdTop = 250;
            birdVelocity = 0;
            isGameOver = false;
            score = 0;
            pipes = [];
            scoreDisplay.textContent = '0';
            gameOverModal.style.display = 'none';
            bird.style.top = birdTop + 'px';
            bird.style.left = '50px';
            
            document.querySelectorAll('.pipe').forEach(pipe => pipe.remove());
            
            document.addEventListener('keydown', jump);
            gameContainer.addEventListener('click', jump);
        }

        function jump(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (!isGameOver) {
                birdVelocity = -9;
                bird.style.transform = 'rotate(-20deg)';
                setTimeout(() => {
                    if (!isGameOver) bird.style.transform = 'rotate(0deg)';
                }, 100);
            }
        }

        function createPipe() {
            if (isGameOver) return;

            const gap = 150;
            const minHeight = 50;
            const maxHeight = 350;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight)) + minHeight;
            const bottomHeight = 600 - 150 - topHeight - gap;

            const pipeTop = document.createElement('div');
            pipeTop.className = 'pipe pipe-top';
            pipeTop.style.height = topHeight + 'px';
            pipeTop.style.top = '0';
            pipeTop.style.left = '400px';

            const pipeBottom = document.createElement('div');
            pipeBottom.className = 'pipe pipe-bottom';
            pipeBottom.style.height = bottomHeight + 'px';
            pipeBottom.style.bottom = '150px';
            pipeBottom.style.left = '400px';

            gameContainer.appendChild(pipeTop);
            gameContainer.appendChild(pipeBottom);

            pipes.push({ top: pipeTop, bottom: pipeBottom, passed: false });
        }

        function movePipes() {
            pipes.forEach((pipe, index) => {
                let pipeLeft = parseInt(pipe.top.style.left);
                pipeLeft -= 3;

                pipe.top.style.left = pipeLeft + 'px';
                pipe.bottom.style.left = pipeLeft + 'px';

                if (pipeLeft < -60) {
                    pipe.top.remove();
                    pipe.bottom.remove();
                    pipes.splice(index, 1);
                }

                if (pipeLeft < 50 && !pipe.passed) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                }

                checkCollision(pipe, pipeLeft);
            });
        }

        function checkCollision(pipe, pipeLeft) {
            const birdLeft = 50;
            const birdRight = birdLeft + 45;
            const birdBottom = birdTop + 45;

            const pipeRight = pipeLeft + 60;
            const topPipeBottom = parseInt(pipe.top.style.height);
            const bottomPipeTop = 600 - 150 - parseInt(pipe.bottom.style.height);

            if (birdRight > pipeLeft && birdLeft < pipeRight) {
                if (birdTop < topPipeBottom || birdBottom > bottomPipeTop) {
                    endGame();
                }
            }
        }

        function applyPhysics() {
            if (!isGameOver) {
                birdVelocity += gravity;
                birdTop += birdVelocity;
                bird.style.top = birdTop + 'px';

                if (birdVelocity > 0) {
                    let rotation = Math.min(birdVelocity * 3, 90);
                    bird.style.transform = `rotate(${rotation}deg)`;
                }

                if (birdTop <= 0 || birdTop >= 600 - 150 - 45) {
                    endGame();
                }
            }
        }

        function endGame() {
            if (isGameOver) return;
            isGameOver = true;
            clearInterval(pipeInterval);
            cancelAnimationFrame(gameLoop);
            
            finalScoreDisplay.textContent = score;
            gameOverModal.style.display = 'block';
            
            document.removeEventListener('keydown', jump);
            gameContainer.removeEventListener('click', jump);
        }

        function startGame() {
            initializeGame();
            
            pipeInterval = setInterval(createPipe, 2000);
            createPipe();

            function animate() {
                if (!isGameOver) {
                    applyPhysics();
                    movePipes();
                    gameLoop = requestAnimationFrame(animate);
                }
            }
            animate();
        }

        retryBtn.addEventListener('click', startGame);

        startGame();
    </script>
</body>
</html>
